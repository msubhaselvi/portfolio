<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resume - M. Subha Selvi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #d0eaff, #ffffff);
      color: #333;
      font-size: 1.1rem;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #003366;
      color: #fff;
      padding: 20px 0;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: #ddd;
      margin: 0 15px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #ffd700;
    }

    main {
      flex: 1;
      padding: 40px 20px;
      max-width: 850px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.7s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      padding: 50px 40px;
      text-align: center;
      width: 100%;
    }

    .card h2 {
      font-size: 2.2rem;
      color: #003366;
      margin-bottom: 20px;
    }

    .card p {
      font-size: 1.15rem;
      line-height: 1.8;
      margin-bottom: 25px;
    }

    .download-btn {
      display: inline-block;
      padding: 12px 25px;
      background-color: #003366;
      color: white;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    .download-btn:hover {
      background-color: #0055aa;
    }

    .download-btn i {
      margin-right: 8px;
    }

    footer {
      background: #003366;
      color: white;
      text-align: center;
      padding: 15px 10px;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Resume 📄</h1>
    <nav>
      <a href="about.html">About</a>
      <a href="skills.html">Skills</a>
      <a href="projects.html">Projects</a>
      <a href="certifications.html">Certifications</a>
      <a href="contact.html">Contact</a>
      <a href="education.html">Education</a>
      <a href="resume.html">Resume</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h2>M. Subha Selvi</h2>
      <p>Software Developer with expertise in Java, Python, React.js, and Spring Boot.</p>
      <p>View my resume below:</p>
      <a href="images/Subha_Resume.pdf" class="download-btn" download>
        <i class="fas fa-download"></i> View Resume (PDF)
      </a>
    </div>
  </main>

  <footer>
    <p>All rights reserved © 2025</p>
  </footer>
</body>
</html>
